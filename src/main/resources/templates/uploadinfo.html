<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>下載專區後台管理</title>

  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      padding: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    input {
      margin: 5px 0;
      display: block;
      width: 300px;
      padding: 6px;
      font-size: 14px;
    }

    button {
      padding: 6px 14px;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      margin-top: 10px;
      width: 100%;
    }

    td, th {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    .form-row {
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<h2>新增下載檔案</h2>

<form id="download-form" enctype="multipart/form-data">
  <div class="form-row">
    檔案名稱：
    <input type="text" name="title" required>
  </div>

  <div class="form-row">
    檔案：
    <input type="file" name="file" required>
  </div>

  <div class="form-row">
    <button type="submit">上傳檔案</button>
  </div>
</form>

<h2>下載檔案清單</h2>

<table id="download-table">
  <thead>
    <tr>
      <th>檔案名稱</th>
      <th>檔案大小</th>
      <th>更新日期</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_BASE = "";

/* =========================
   上傳檔案
========================= */
document.getElementById("download-form").onsubmit = e => {
  e.preventDefault();

  const formData = new FormData(e.target);

  fetch(`${API_BASE}/api/admin/downloads/upload`, {
    method: "POST",
    body: formData
  })
  .then(res => {
    if (!res.ok) throw new Error("upload failed");
    return res.json();
  })
  .then(() => {
    e.target.reset();
    loadDownloads();
  })
  .catch(() => alert("上傳失敗"));
};

/* 載入清單*/
function loadDownloads() {
  fetch(`${API_BASE}/api/downloads`)
    .then(res => res.json())
    .then(list => {
      const tbody = document.querySelector("#download-table tbody");
      tbody.innerHTML = "";

      list.forEach(d => {
        tbody.innerHTML += `
          <tr>
            <td>${d.title}</td>
            <td>${d.fileSize || "-"}</td>
            <td>${d.updateDate || "-"}</td>
            <td>
              <button onclick="downloadFile(${d.id})">下載</button>
              <button onclick="deleteFile(${d.id})">刪除</button>
            </td>
          </tr>
        `;
      });
    });
}

/* =========================
   下載
========================= */
function downloadFile(id) {
  window.open(`${API_BASE}/api/downloads/${id}/download`, "_blank");
}

/* =========================
   刪除（需後端支援）
========================= */
function deleteFile(id) {
  if (!confirm("確定刪除檔案？")) return;

  fetch(`${API_BASE}/api/admin/downloads/${id}`, {
    method: "DELETE"
  })
  .then(() => loadDownloads());
}

loadDownloads();
</script>

</body>
</html>

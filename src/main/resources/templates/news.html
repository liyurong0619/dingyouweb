<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>消息發送管理系統</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f6f8fa;
      padding: 20px;
    }
    h2 {
      color: #333;
      text-align: center;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input[type="text"], textarea, select, input[type="datetime-local"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 14px;
    }
    textarea {
      height: 80px;
      resize: none;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .btn-send {
      background-color: #28a745;
      color: #fff;
    }
    .btn-preview {
      background-color: #007bff;
      color: #fff;
      margin-left: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }
    .published { background-color: #28a745; }
    .scheduled { background-color: #ffc107; color: #000; }
    .cancelled { background-color: #dc3545; }
    .btn-delete {
      background-color: #dc3545;
      color: #fff;
    }
    .btn-cancel {
      background-color: #ffc107;
      color: #000;
    }
  </style>
</head>
<body>
  <h2>📢 消息發送管理系統</h2>

  <form id="newsForm">
    <label>消息標題：</label>
    <input type="text" id="newsTitle" placeholder="輸入標題..." required>

    <label>消息內容：</label>
    <textarea id="newsContent" placeholder="輸入內容..." required></textarea>

    <label>發送方式：</label>
    <select id="newsSendMode">
      <option value="immediate">立即發送</option>
      <option value="scheduled">預約發送</option>
    </select>

    <label>預約日期與時間：</label>
    <input type="datetime-local" id="newsSendTime" disabled>

    <button type="button" class="btn-send" onclick="sendNews()">發送</button>
    <button type="button" class="btn-preview" onclick="previewNews()">預覽</button>
  </form>

  <table id="newsTable">
    <thead>
      <tr>
        <th>編號</th>
        <th>標題</th>
        <th>時間</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
  const apiBase = "/api/news";

  const sendModeSelect = document.getElementById("newsSendMode");
  const sendTimeInput = document.getElementById("newsSendTime");

  /* =============================
     工具：取得「本地 datetime-local 格式」
     （避免 toISOString() 造成 UTC -8 問題）
  ============================= */
  function getLocalDateTimeString(date = new Date()) {
    const pad = n => String(n).padStart(2, "0");
    return (
      date.getFullYear() + "-" +
      pad(date.getMonth() + 1) + "-" +
      pad(date.getDate()) + "T" +
      pad(date.getHours()) + ":" +
      pad(date.getMinutes())
    );
  }

  /* =============================
     發送模式切換
  ============================= */
  sendModeSelect.addEventListener("change", e => {
    const isScheduled = e.target.value === "scheduled";
    sendTimeInput.disabled = !isScheduled;

    if (isScheduled) {
      // 預約時間不能選過去（本地時間）
      sendTimeInput.min = getLocalDateTimeString();
    } else {
      sendTimeInput.value = "";
    }
  });

  /* =============================
     載入消息列表
  ============================= */
  async function loadNewsList() {
    const res = await fetch(`${apiBase}/list`);
    const data = await res.json();
    renderTable(data);
  }

  /* =============================
     發送消息
  ============================= */
  async function sendNews() {
    const title = document.getElementById("newsTitle").value.trim();
    const content = document.getElementById("newsContent").value.trim();
    const mode = sendModeSelect.value;
    const sendTime = sendTimeInput.value;

    if (!title || !content) {
      alert("請輸入標題與內容！");
      return;
    }

    // 防呆：預約但沒選時間
    if (mode === "scheduled" && !sendTime) {
      alert("請選擇預約發送時間！");
      return;
    }

    const payload = {
      newsTitle: title,
      newsContent: content,
      newsSendMode: mode,
      newsSendTime: sendTime   // datetime-local（台灣時間）
    };

    const res = await fetch(`${apiBase}/send`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.text();

    if (result === "傳送成功") {
      alert("傳送成功");
      loadNewsList();
      document.getElementById("newsForm").reset();
      sendTimeInput.disabled = true;
    } else {
      alert("傳送失敗（資料庫未連線或錯誤）");
    }
  }

  /* =============================
     預覽
  ============================= */
  function previewNews() {
    const title = document.getElementById("newsTitle").value;
    const content = document.getElementById("newsContent").value;
    alert(`預覽\n\n標題：${title}\n內容：${content}`);
  }

  /*刪除 / 取消 */
  async function deleteNews(id) {
    if (!confirm("確定要刪除此消息？")) return;
    await fetch(`${apiBase}/delete/${id}`, { method: "DELETE" });
    loadNewsList();
  }

  async function cancelNews(id) {
    if (!confirm("確定要取消預約？")) return;
    await fetch(`${apiBase}/cancel/${id}`, { method: "POST" });
    loadNewsList();
  }

  /*  表格渲染（不再 +8）*/
  function renderTable(list) {
    const tbody = document.querySelector("#newsTable tbody");
    tbody.innerHTML = "";

    list.forEach(news => {
      const row = document.createElement("tr");

      const sendTimeText = (() => {
        const dt = new Date(news.newsSendTime); // 已是台灣時間
        return dt.toLocaleString("zh-TW");
      })();

      row.innerHTML = `
        <td>${news.newsId}</td>
        <td>${news.newsTitle}</td>
        <td>${sendTimeText}</td>
        <td>
          <span class="tag ${news.newsStatus}">
            ${statusText(news.newsStatus)}
          </span>
        </td>
        <td>
          <button class="btn-delete" onclick="deleteNews(${news.newsId})">刪除</button>
          ${
            news.newsStatus === "scheduled"
              ? `<button class="btn-cancel" onclick="cancelNews(${news.newsId})">取消預約</button>`
              : ""
          }
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  function statusText(status) {
    switch (status) {
      case "published": return "已發送";
      case "scheduled": return "已預約";
      case "cancelled": return "已取消";
      default: return status;
    }
  }

  loadNewsList();
</script>



</body>
</html>
